upstream django {
    server web:8000;
}

upstream websocket {
    server websocket:8001;
}

# Staging: отдельный поддомен crm-staging.groupprofi.ru (прод — crm.groupprofi.ru).
# HTTPS: после получения сертификата (certbot -d crm-staging.groupprofi.ru) добавьте
# отдельный server { listen 443 ssl; server_name crm-staging.groupprofi.ru; ... } и редирект с 80.
server {
    listen 80;
    server_name crm-staging.groupprofi.ru 5.181.254.172;

    client_max_body_size 20M;
    
    # Логи
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;
    
    # Кастомные страницы ошибок
    error_page 500 /500.html;
    error_page 502 /502.html;
    error_page 503 /503.html;
    error_page 504 /504.html;
    
    location = /500.html {
        root /usr/share/nginx/html/error_pages;
        internal;
    }
    
    location = /502.html {
        root /usr/share/nginx/html/error_pages;
        internal;
    }
    
    location = /503.html {
        root /usr/share/nginx/html/error_pages;
        internal;
    }
    
    location = /504.html {
        root /usr/share/nginx/html/error_pages;
        internal;
    }
    
    # Статические файлы
    location /static/ {
        alias /usr/share/nginx/html/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
    
    # Медиа файлы
    location /media/ {
        alias /usr/share/nginx/html/media/;
        expires 7d;
        add_header Cache-Control "public";
    }
    
    # Health check endpoint
    location /health/ {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        access_log off;
    }
    
    # WebSocket — real-time обновления через Django Channels
    location /ws/ {
        proxy_pass http://websocket;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;  # 24h — WebSocket держится долго
        proxy_send_timeout 86400s;
    }

    # SSE Stream для виджета — специальные настройки для EventSource
    location /api/widget/stream/ {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Origin $http_origin;
        proxy_intercept_errors off;
        proxy_buffering off;  # Критично для SSE: не буферизовать ответы
        proxy_cache off;      # Отключить кеш для SSE
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 90s;  # Увеличен для долгих SSE-соединений
        add_header Cache-Control "no-cache";
        add_header X-Accel-Buffering "no";  # Дополнительно для nginx
    }
    
    # Operator SSE Streams — per-conversation и notifications
    location ~ ^/api/conversations/.+/stream/ {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 90s;
        add_header Cache-Control "no-cache";
        add_header X-Accel-Buffering "no";
    }

    # Widget API — CORS на ответы обрабатывает Django (_add_widget_cors_headers).
    # Preflight (OPTIONS) перехватывается nginx, т.к. django-cors-headers
    # не знает о widget origins (они проверяются в Django-view отдельно).
    location /api/widget/ {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Accept" always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Max-Age 86400;
            add_header Content-Length 0;
            add_header Content-Type "text/plain charset=UTF-8";
            return 204;
        }

        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Origin $http_origin;
        proxy_intercept_errors off;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
    
    # Основной прокси на Django
    location / {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        
        # Перехватываем ошибки от upstream для показа кастомных страниц
        proxy_intercept_errors on;
        
        # Таймауты для долгих запросов
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
