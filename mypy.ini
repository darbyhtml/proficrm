[mypy]
# Wave 0.2 (2026-04-20): базовый mypy-конфиг для CRM ПРОФИ.
#
# Политика:
# - Сейчас: НЕ strict. Только `check_untyped_defs=true` + плагины.
#   Baseline фиксируем в docs/audit/mypy-baseline.json.
# - Ratcheting в CI: число ошибок в PR не должно превышать baseline.
# - Точечный strict: для новых сервисов (companies/services/, *.services.py)
#   через [mypy-<module>] → `strict = True`. Делаем постепенно в W1+.

python_version = 3.13
plugins = mypy_django_plugin.main, mypy_drf_plugin.main

# backend/ — корень sys.path для импорта crm.settings_test + всех apps.
mypy_path = backend
namespace_packages = True
explicit_package_bases = True

# Базовый набор проверок — то, что даёт пользу без слома всего.
check_untyped_defs = True
warn_redundant_casts = True
warn_unused_ignores = True
warn_return_any = False          # Много legacy — подключим в W3+
no_implicit_optional = True      # Явно requires Optional где None допустим
strict_optional = True
disallow_incomplete_defs = False # Пока можно частичные типы
disallow_untyped_defs = False    # Очень агрессивное — в W3+

# Какие файлы сканируем.
files = backend/

# Быстрый режим для больших кодобаз (инкрементальный кэш).
incremental = True
cache_dir = .mypy_cache

# Игнорируем миграции целиком (автогенерируемый код).
exclude = (?x)(
    ^backend/.*/migrations/
    | ^backend/staticfiles/
    | ^backend/media/
    | ^\.venv/
    | ^graphify-out/
    | ^knowledge-base/
  )

# Тихий режим — меньше шума в CI.
show_error_codes = True
show_column_numbers = True
pretty = False                   # В CI JSON format, не pretty

# -----------------------------------------------------------------------------
# django-stubs plugin config
# -----------------------------------------------------------------------------
[mypy.plugins.django-stubs]
django_settings_module = crm.settings_test

# -----------------------------------------------------------------------------
# Per-module overrides
# -----------------------------------------------------------------------------

# Сторонние пакеты без стабов — игнорируем missing-imports.
[mypy-phonenumbers.*]
ignore_missing_imports = True

[mypy-qrcode.*]
ignore_missing_imports = True

[mypy-nh3]
ignore_missing_imports = True

[mypy-firebase_admin.*]
ignore_missing_imports = True

[mypy-pywebpush.*]
ignore_missing_imports = True

[mypy-channels.*]
ignore_missing_imports = True

[mypy-channels_redis.*]
ignore_missing_imports = True

[mypy-sentry_sdk.*]
ignore_missing_imports = True

[mypy-django_extensions.*]
ignore_missing_imports = True

# Миграции — не анализируем.
[mypy-*.migrations.*]
ignore_errors = True

# Тесты — более мягкий режим (много monkey-patches, mocks).
[mypy-*.tests.*]
check_untyped_defs = False
disallow_untyped_defs = False

[mypy-*.tests]
check_untyped_defs = False

[mypy-*.test_*]
check_untyped_defs = False

[mypy-*.tests_*]
check_untyped_defs = False

# -----------------------------------------------------------------------------
# Точки будущего strict (Wave 1+ — постепенное включение).
# Пока закомментированы, включаем по готовности кода.
# -----------------------------------------------------------------------------

# [mypy-companies.services.*]
# strict = True  # включить после W2 когда все сервисы вычищены

# [mypy-core.*]
# strict = True  # мелкий модуль, можно раньше
