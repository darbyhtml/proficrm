{# Немодальная панель для создания/редактирования контакта (без перекрытия страницы) #}
<div class="space-y-3" data-contact-form-root>
  <div class="flex items-start justify-between gap-3">
    <div>
      <div class="text-xs text-brand-dark/70">{{ company.name }}</div>
      <div class="text-lg font-semibold">
        {% if mode == 'edit' %}Редактировать контакт{% else %}Новый контакт{% endif %}
      </div>
    </div>
    <button type="button" class="btn btn-outline btn-sm" data-contact-panel-close title="Закрыть" aria-label="Закрыть">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M18 6L6 18"/><path d="M6 6l12 12"/>
      </svg>
    </button>
  </div>

  <form method="post" action="{{ action_url }}" class="space-y-4" data-contact-panel-form novalidate>
    {% csrf_token %}
    <input type="hidden" name="modal" value="1" />
    {% include "ui/_contact_form_fields.html" %}
    <div class="flex gap-2 justify-end">
      <button class="btn btn-primary" type="submit">
        {% if mode == 'edit' %}Сохранить{% else %}Создать{% endif %}
      </button>
      <button class="btn btn-outline" type="button" data-contact-panel-close>Отмена</button>
    </div>
  </form>
</div>
