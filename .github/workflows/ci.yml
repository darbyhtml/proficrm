name: CI

on:
  push:
    branches: [main, feature/**]
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # 1. Ruff — линтинг (fast, parallel с другими jobs)
  # ---------------------------------------------------------------------------
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      - name: Install dev tools
        run: pip install -r backend/requirements-dev.txt
      - name: Ruff check
        run: ruff check backend

  # ---------------------------------------------------------------------------
  # 2. Black --check — форматтер (Wave 0.2b)
  # ---------------------------------------------------------------------------
  format-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      - name: Install black
        run: pip install "black==25.11.0"
      - name: Black --check
        run: black --check backend

  # ---------------------------------------------------------------------------
  # 3. Mypy ratchet — нельзя добавлять новые type errors (Wave 0.2d)
  # ---------------------------------------------------------------------------
  mypy:
    runs-on: ubuntu-latest
    continue-on-error: true   # пока в informational режиме; переключить на strict в W1
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      - name: Install mypy + stubs + project deps
        run: |
          pip install -r backend/requirements.txt
          pip install -r backend/requirements-dev.txt
      - name: Mypy ratchet (vs baseline)
        env:
          DJANGO_SETTINGS_MODULE: crm.settings_test
          DJANGO_SECRET_KEY: ci-secret
          MAILER_FERNET_KEY: ""
        run: python scripts/mypy_ratchet.py

  # ---------------------------------------------------------------------------
  # 4. Bandit — security scan (Wave 0.2e; fail при новых Medium+)
  # ---------------------------------------------------------------------------
  bandit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install bandit
        run: pip install "bandit[toml]==1.8.6"
      - name: Bandit -ll (Medium + High)
        run: bandit -c pyproject.toml -r backend/ -ll

  # ---------------------------------------------------------------------------
  # 5. Gitleaks — secrets scan (существующий)
  # ---------------------------------------------------------------------------
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: false

  # ---------------------------------------------------------------------------
  # 6. Django migration linter — только для новых миграций (Wave 0.2f)
  # ---------------------------------------------------------------------------
  migration-linter:
    runs-on: ubuntu-latest
    continue-on-error: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # нужен для diff vs main
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install deps
        run: |
          pip install -r backend/requirements.txt
          pip install -r backend/requirements-dev.txt
      - name: Lint migrations (только новые по сравнению с main)
        working-directory: backend
        env:
          DJANGO_SETTINGS_MODULE: crm.settings_test
          DJANGO_DEBUG: "1"
          DJANGO_SECRET_KEY: ci-secret-key-not-for-production
          DJANGO_ALLOWED_HOSTS: "*"
          MAILER_FERNET_KEY: ""
          PUBLIC_BASE_URL: "http://localhost"
          SECURITY_CONTACT_EMAIL: "ci@example.com"
        run: |
          # Проверяем только новые миграции (git-commit-id=origin/main)
          python manage.py lintmigrations \
            --include-apps accounts companies tasksapp ui audit mailer notifications phonebridge policy messenger \
            --git-commit-id origin/main \
            || echo "⚠️ Unsafe migration detected — review migrations/"
        continue-on-error: true  # пока warning, в W1 → error

  # ---------------------------------------------------------------------------
  # 7. Django test suite + coverage gate (Wave 0.2d)
  # ---------------------------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    needs: [lint, format-check]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: crm_test
          POSTGRES_USER: crm
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U crm"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_ENGINE: postgres
      POSTGRES_DB: crm_test
      POSTGRES_USER: crm
      POSTGRES_PASSWORD: testpassword
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      DJANGO_SECRET_KEY: ci-secret-key-not-for-production
      DJANGO_DEBUG: "1"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
      REDIS_URL: "redis://localhost:6379/0"
      MAILER_FERNET_KEY: ""
      PUBLIC_BASE_URL: "http://localhost"
      SECURITY_CONTACT_EMAIL: "ci@example.com"
      # F11: гарантированно используем crm.settings_test для всех test-runs.
      DJANGO_SETTINGS_MODULE: crm.settings_test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt coverage==7.13.5

      - name: Run migrations
        working-directory: backend
        run: python manage.py migrate --noinput

      - name: Run tests with coverage
        working-directory: backend
        run: |
          coverage run --source='.' \
            --omit='*/migrations/*,*/tests*.py,*/test_*.py,*/conftest*.py,manage.py,crm/asgi.py,crm/wsgi.py,amocrm/migrate.py,*/management/commands/*' \
            manage.py test --verbosity=1

      - name: Coverage report + gate (fail_under=50 из pyproject.toml)
        working-directory: backend
        run: |
          coverage report --skip-empty --rcfile=../pyproject.toml
          # fail_under читается из [tool.coverage.report] в pyproject.toml.
          # Политика: траектория +5%/волна → 85 к W14 (см. pyproject.toml комментарий).

      - name: Upload coverage.xml for trend tracking
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: docs/audit/coverage-baseline.xml
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # 8. Known-CVE scanner для Python deps (информационный)
  # ---------------------------------------------------------------------------
  deps-audit:
    runs-on: ubuntu-latest
    continue-on-error: true  # информационный job, не блокирует merge
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Audit production dependencies
        working-directory: backend
        run: pip-audit -r requirements.txt --desc --format columns
