name: Deploy Staging

# Автодеплой на staging после успешного CI на main.
# Прод не трогаем — prod деплоится вручную через 21-release-1-ready-to-execute.md.
#
# 2026-04-21 (post-SEV2): добавлен nginx restart (Layer 2 incident fix)
# + post-deploy smoke в CI + auto-rollback при red smoke.

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: git pull + rebuild + up -d + smoke на staging
    runs-on: ubuntu-latest
    # Деплоим только если CI прошёл успешно
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.STAGING_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 5.181.254.172 >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy + smoke + auto-rollback
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no root@5.181.254.172 bash -s << 'REMOTE'
            # set -euxo pipefail:
            #   -e: exit on command error
            #   -u: error on undefined var
            #   -x: trace each command (visible в GitHub Actions log)
            #   -o pipefail: pipe failures propagate
            # Previously just `-eo pipefail` — silent partial exits possible.
            set -euxo pipefail
            cd /opt/proficrm-staging

            # ------------------------------------------------------------
            # [1/6] git fetch + reset --hard origin/main
            # (hard reset instead of pull — после filter-repo histories могут
            # дивергировать, pull fails "divergent branches". Reset always
            # matches remote state exactly.)
            # ------------------------------------------------------------
            echo "=== [1/6] git fetch + reset to origin/main ==="
            git fetch origin main
            HEAD_BEFORE=$(git rev-parse HEAD)
            git reset --hard origin/main
            HEAD_AFTER=$(git rev-parse HEAD)

            if [ "$HEAD_BEFORE" = "$HEAD_AFTER" ]; then
              echo "Staging уже на HEAD ($HEAD_AFTER) — пропускаем rebuild"
              exit 0
            fi

            echo "Новый HEAD: $HEAD_AFTER (было: $HEAD_BEFORE)"
            # Сохраняем HEAD_BEFORE для rollback (outside set -e block)
            echo "$HEAD_BEFORE" > /tmp/proficrm-staging-last-head

            # ------------------------------------------------------------
            # Функция для auto-rollback при red smoke
            # ------------------------------------------------------------
            rollback() {
              local reason="$1"
              echo ""
              echo "!!! ROLLBACK triggered: $reason"
              echo "!!! Reverting staging to $HEAD_BEFORE"
              git reset --hard "$HEAD_BEFORE"
              docker compose -f docker-compose.staging.yml -p proficrm-staging \
                build web celery celery-beat websocket
              docker compose -f docker-compose.staging.yml -p proficrm-staging \
                up -d --force-recreate web celery celery-beat websocket
              docker restart crm_staging_nginx
              sleep 30
              echo "!!! Rollback smoke verification:"
              if bash tests/smoke/staging_post_deploy.sh; then
                echo "!!! Rollback succeeded, staging back on $HEAD_BEFORE"
                exit 1  # deploy failed, but staging safe
              else
                echo "!!! CRITICAL: rollback ALSO failed smoke — manual intervention required"
                exit 2
              fi
            }

            # ------------------------------------------------------------
            # [2/6] Build (web + все django-based sidecars)
            # ------------------------------------------------------------
            echo "=== [2/6] Build образов (web + celery + celery-beat + websocket) ==="
            docker compose -f docker-compose.staging.yml -p proficrm-staging \
              build web celery celery-beat websocket || rollback "build failed"

            # ------------------------------------------------------------
            # [3/6] Migrate
            # ------------------------------------------------------------
            echo "=== [3/6] Migrate ==="
            # -T: disable pseudo-TTY, preserves parent bash heredoc stdin.
            # </dev/null: explicit no-stdin (belt-and-suspenders).
            # Без этих flag docker compose run consumed heredoc stdin, что
            # вызывало silent exit после migrate — steps 4-6 never ran,
            # container не recreated. Discovered 2026-04-22 post-W2.2 2FA deploy.
            docker compose -f docker-compose.staging.yml -p proficrm-staging \
              run --rm -T web python manage.py migrate --noinput </dev/null \
              || rollback "migrate failed"

            # ------------------------------------------------------------
            # [4/6] Force-recreate сервисов
            # ------------------------------------------------------------
            echo "=== [4/6] Recreate сервисов ==="
            docker compose -f docker-compose.staging.yml -p proficrm-staging \
              up -d --force-recreate web celery celery-beat websocket \
              || rollback "up --force-recreate failed"

            # ------------------------------------------------------------
            # [5/6] nginx DNS cache flush (SEV2 2026-04-21 Layer 2 fix)
            # После force-recreate web контейнер получает новый Docker IP,
            # host-level staging-nginx должен пере-резолвить upstream.
            # ------------------------------------------------------------
            echo "=== [5/6] nginx DNS cache flush ==="
            docker restart crm_staging_nginx || rollback "nginx restart failed"

            # ------------------------------------------------------------
            # [6/6] Post-deploy smoke (30s grace для стартапа)
            # ------------------------------------------------------------
            echo "=== [6/6] Post-deploy smoke (30s grace) ==="
            sleep 30
            docker ps --filter "name=crm_staging" --format "table {{.Names}}\t{{.Status}}"
            echo ""
            bash tests/smoke/staging_post_deploy.sh || rollback "post-deploy smoke failed"

            echo ""
            echo "=== Deploy staging УСПЕШНО завершён: $HEAD_AFTER ==="
            # Explicit completion marker — если этот string не в deploy log,
            # значит heredoc exit'нул раньше завершения. GitHub Actions может
            # report "success" misleadingly (как было 2026-04-22 с 2FA deploy).
            # grep-check этого маркера в любой observation/alerting.
            echo "=== DEPLOY FULLY COMPLETED ==="
          REMOTE

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Staging deploy failed."
          echo "Check workflow logs above. Staging auto-rollbacks on smoke red;"
          echo "if manual intervention needed, SSH to staging and run:"
          echo "  cd /opt/proficrm-staging && git log -1 && make smoke-staging"
