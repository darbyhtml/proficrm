# Wave 0.4 (2026-04-20) — template для /etc/proficrm/env.d/glitchtip.conf
#
# ❌ ЭТОТ ФАЙЛ НЕ ДОЛЖЕН ПОПАСТЬ В GIT!
#    Реальные секреты → /etc/proficrm/env.d/glitchtip.conf на сервере.
#    Этот шаблон в git — чтобы было из чего копировать.
#
# Деплой:
#   1. sudo mkdir -p /etc/proficrm/env.d
#   2. sudo cp scripts/glitchtip-env-template.conf /etc/proficrm/env.d/glitchtip.conf
#   3. sudo chmod 600 /etc/proficrm/env.d/glitchtip.conf
#   4. sudo nano /etc/proficrm/env.d/glitchtip.conf — заполни все <REPLACE_*> значения
#   5. Проверь: source /etc/proficrm/env.d/glitchtip.conf && echo $GLITCHTIP_SECRET_KEY

# -----------------------------------------------------------------------------
# Основные секреты
# -----------------------------------------------------------------------------

# 50+ случайных символов. Сгенерировать:
#   python3 -c 'import secrets; print(secrets.token_urlsafe(50))'
GLITCHTIP_SECRET_KEY=<REPLACE_WITH_SECRETS_TOKEN_URLSAFE_50>

# Сильный пароль для отдельной БД GlitchTip (не совпадает с CRM db password).
# Сгенерировать: openssl rand -base64 32 | tr -d '/+' | head -c 32
GLITCHTIP_DB_PASSWORD=<REPLACE_WITH_STRONG_PASSWORD>

# -----------------------------------------------------------------------------
# Почта (для alert-email'ов и сброса пароля)
# -----------------------------------------------------------------------------

# SMTP URL. Можно использовать smtp.bz (тот же, что в CRM):
#   smtp+tls://user:password@smtp.bz:587
# Пароль от smtp.bz см. в /etc/proficrm/env.d/mailer.conf на сервере.
EMAIL_URL=<REPLACE_WITH_SMTP_URL>

# Адрес отправителя алертов.
GLITCHTIP_DEFAULT_FROM_EMAIL=noreply@groupprofi.ru

# -----------------------------------------------------------------------------
# Публичный URL
# -----------------------------------------------------------------------------
GLITCHTIP_DOMAIN=https://glitchtip.groupprofi.ru

# -----------------------------------------------------------------------------
# Параметры первичного создания суперпользователя (опционально, для non-interactive
# bootstrap — см. scripts/glitchtip-bootstrap.sh)
# -----------------------------------------------------------------------------
# GLITCHTIP_SUPERUSER_EMAIL=admin@groupprofi.ru
# GLITCHTIP_SUPERUSER_PASSWORD=<strong_password_for_first_login>
