# Wave 0.4 closeout (2026-04-21) — nginx reverse-proxy для Uptime Kuma.
#
# Особенности:
# - Kuma использует Socket.IO (WebSocket) — нужны proxy_http_version 1.1 +
#   Upgrade/Connection headers для long-polling и WS upgrade.
# - Basic-auth защита: Kuma публично доступен не должен (админский инструмент).
# - Basic-auth bypass для notification-webhook path (если в будущем понадобится
#   push-уведомление из внешнего источника).
#
# Деплой:
#   sudo cp configs/nginx/uptime.groupprofi.ru.conf /etc/nginx/sites-available/
#   sudo ln -sf /etc/nginx/sites-available/uptime.groupprofi.ru.conf /etc/nginx/sites-enabled/
#   sudo htpasswd -cb /etc/nginx/.htpasswd-uptime admin <password>
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d uptime.groupprofi.ru --non-interactive --agree-tos \
#       -m admin@groupprofi.ru --redirect

server {
    server_name uptime.groupprofi.ru;

    # Basic-auth — защита Kuma от публичного доступа.
    auth_basic "Uptime monitoring — restricted area";
    auth_basic_user_file /etc/nginx/.htpasswd-uptime;

    # WebSocket + Socket.IO support для Kuma realtime UI.
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;  # long-polling + WS могут висеть часами
        proxy_send_timeout 60s;
    }

    # certbot добавит:
    #   listen 443 ssl;
    #   ssl_certificate /etc/letsencrypt/live/uptime.groupprofi.ru/fullchain.pem;
    #   ssl_certificate_key /etc/letsencrypt/live/uptime.groupprofi.ru/privkey.pem;
    listen 80;
}
