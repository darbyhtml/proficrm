# Wave 0.4 (2026-04-20) — nginx reverse-proxy for self-hosted GlitchTip.
#
# Деплой:
#   sudo cp configs/nginx/glitchtip.groupprofi.ru.conf /etc/nginx/sites-available/
#   sudo ln -s /etc/nginx/sites-available/glitchtip.groupprofi.ru.conf /etc/nginx/sites-enabled/
#   sudo certbot --nginx -d glitchtip.groupprofi.ru --non-interactive --agree-tos -m admin@groupprofi.ru
#   sudo nginx -t && sudo systemctl reload nginx
#
# После certbot файл будет дополнен managed-блоками ssl_certificate + redirect 80→443.
# Этот файл — ИСХОДНИК (http-only), на сервере его модифицирует certbot.

server {
    server_name glitchtip.groupprofi.ru;

    # GlitchTip поднимает source maps + большие payload-ы для ошибок с
    # минифицированным JS + больших стек-трейсов. 20 MB — разумный предел.
    client_max_body_size 20m;

    # Таймауты: SDK отправляет errors быстро, но на первом старте с JS-sourcemaps
    # может быть медленно. 60 секунд — ok.
    proxy_read_timeout 60s;
    proxy_connect_timeout 10s;
    proxy_send_timeout 60s;

    # GlitchTip не раздаёт статику через nginx — всё через гunicorn (whitenoise).
    # Если в будущем понадобится отдельный static/ — volume mount в compose.

    # Основной location — весь трафик в docker-контейнер.
    location / {
        proxy_pass http://127.0.0.1:8100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # Health-check bypass без auth/logging (для UptimeRobot).
    location = /_health/ {
        access_log off;
        proxy_pass http://127.0.0.1:8100/_health/;
        proxy_set_header Host $host;
    }

    # certbot добавит сюда:
    #   listen 443 ssl;
    #   ssl_certificate /etc/letsencrypt/live/glitchtip.groupprofi.ru/fullchain.pem;
    #   ssl_certificate_key /etc/letsencrypt/live/glitchtip.groupprofi.ru/privkey.pem;
    #   include /etc/letsencrypt/options-ssl-nginx.conf;
    #   ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    listen 80;
}

